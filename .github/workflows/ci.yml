name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.11"

      - run: pip install ruff
      - run: ruff check skills/ scripts/ harness/
      - run: ruff format --check skills/ scripts/ harness/

  sast:
    name: bandit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.11"

      - run: pip install bandit[toml]
      - name: Run Bandit (HIGH severity = fail)
        # -lll = HIGH+ severity, -ii = MEDIUM+ confidence
        run: bandit -r skills/ scripts/ harness/ -lll -ii

  dependency-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.11"

      - run: pip install pip-audit
      - run: pip install -e .
      - name: Audit installed packages
        run: pip-audit --desc on

  validate-env:
    name: validate_env (layout + packages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.11"

      - run: pip install -e .

      - name: Run pre-flight check (non-credential checks only)
        run: |
          python3 scripts/validate_env.py --ci --json > /tmp/preflight.json 2>/dev/null || true
          python3 - <<'PYEOF'
          import json, sys
          with open("/tmp/preflight.json") as f:
              data = json.load(f)
          cred_skip = {
              "SF_USERNAME", "SF_PASSWORD", "SF_SECURITY_TOKEN",
              "SF_AUTH_METHOD", "SF_CONSUMER_KEY", "SF_PRIVATE_KEY_PATH",
              "OPENAI_API_KEY", ".env",
              "openai-key-format",
              "SF_DOMAIN", "SF_INSTANCE_URL",
          }
          failures = [
              r for r in data
              if r["status"] == "fail" and r["hard"] and r["name"] not in cred_skip
          ]
          if failures:
              print("FAIL:", [r["name"] + ": " + r["message"] for r in failures])
              sys.exit(1)
          print("OK — all non-credential pre-flight checks pass")
          PYEOF

  license-check:
    name: pip-licenses (no GPL/AGPL/LGPL)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.11"

      - run: pip install pip-licenses
      - run: pip install -e .

      - name: Check for copyleft licenses
        run: |
          pip-licenses --format=json --output-file=/tmp/licenses.json
          python3 - <<'PYEOF'
          import json, sys
          with open("/tmp/licenses.json") as f:
              packages = json.load(f)
          # Match both human-readable names and SPDX short identifiers (case-insensitive)
          blocked_families = {"gpl", "lgpl", "agpl"}
          # Explicitly reviewed and approved LGPL packages (dynamically linked in Python —
          # LGPL permits use without source disclosure if the library is unmodified).
          lgpl_allowlist = {
              "docxtpl",  # LGPL-2.1-only; wraps python-docx for Jinja2 templating;
                          # used unmodified for DOCX report generation. Reviewed 2026-03-02.
              "fpdf2",    # LGPL-3.0-only; pure-Python PDF generation; used unmodified
                          # for report-gen PDF output (internal tooling). Reviewed 2026-03-03.
          }
          violations = [
              f"  {p['Name']} {p['Version']}: {p['License']}"
              for p in packages
              if any(b in p.get("License", "").lower() for b in blocked_families)
              and p["Name"].lower() not in lgpl_allowlist
          ]
          if violations:
              print(f"FAIL: {len(violations)} package(s) with unapproved copyleft license:")
              for v in violations:
                  print(v)
              sys.exit(1)
          print(f"OK — {len(packages)} package(s) checked, no unapproved copyleft licenses found")
          PYEOF

  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0  # full history required by SonarCloud for blame + new-code detection

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.11"

      - run: pip install -e ".[dev]"
      - name: Run tests with coverage
        env:
          QDRANT_IN_MEMORY: "1"
        run: |
          if [ -d tests/ ]; then
            pytest tests/ -v \
              --cov=skills --cov=harness \
              --cov-report=xml:coverage.xml \
              --cov-report=term-missing \
              --cov-fail-under=25
          else
            echo "No tests directory yet — skipping"
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 30

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602  # v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  docker-smoke:
    name: docker compose smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set vm.max_map_count for OpenSearch
        run: sudo sysctl -w vm.max_map_count=262144

      - name: Start OpenSearch stack
        run: docker compose up -d opensearch dashboards

      - name: Wait for OpenSearch to be green
        timeout-minutes: 3
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9200/_cluster/health | grep -qv '"status":"red"'; then
              echo "OpenSearch is healthy"; break
            fi
            echo "Waiting for OpenSearch... ($i/30)"; sleep 6
          done

      - name: Wait for Dashboards to be green
        timeout-minutes: 2
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://localhost:5601/api/status | grep -q '"state":"green"'; then
              echo "Dashboards is healthy"; break
            fi
            echo "Waiting for Dashboards... ($i/20)"; sleep 6
          done

      - name: Verify OpenSearch cluster health endpoint
        run: |
          HEALTH=$(curl -sf http://localhost:9200/_cluster/health)
          echo "$HEALTH" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d['status'] != 'red', f'cluster red: {d}'
          print('Cluster status:', d['status'])
          "

      - name: Verify Dashboards API
        run: |
          STATUS=$(curl -sf http://localhost:5601/api/status)
          echo "$STATUS" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d.get('name'), 'dashboards not ready'
          print('Dashboards OK')
          "

      - name: Tear down
        if: always()
        run: docker compose down -v
