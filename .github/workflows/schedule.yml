name: scheduled-assessment

on:
  schedule:
    # Every Sunday at 02:00 UTC
    - cron: "0 2 * * 0"
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to run (salesforce, workday, both)"
        required: false
        default: "both"

permissions:
  contents: read

jobs:
  salesforce-dry-run:
    name: Salesforce dry-run assessment
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' || github.event.inputs.platform == 'salesforce' || github.event.inputs.platform == 'both' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e .

      - name: Run Salesforce dry-run
        env:
          QDRANT_IN_MEMORY: "1"
          MEMORY_ENABLED: "0"
        run: |
          TODAY=$(date +%Y-%m-%d)
          OUT="docs/oscal-salesforce-poc/generated/ci-dry-run-sfdc/$TODAY"

          # Phase 1: collect — dry-run prints what would be collected (no API calls)
          python3 -m skills.sfdc_connect.sfdc_connect collect \
            --scope all --org ci-dry-run-sfdc --dry-run

          # Phase 2: assess — dry-run generates realistic stub findings without collector input
          python3 -m skills.oscal_assess.oscal_assess assess \
            --dry-run \
            --out "$OUT/gap_analysis.json"

          # Phase 2b: gap map
          python3 scripts/oscal_gap_map.py \
            --controls docs/oscal-salesforce-poc/generated/sbs_controls.json \
            --gap-analysis "$OUT/gap_analysis.json" \
            --mapping config/oscal-salesforce/control_mapping.yaml \
            --sscf-map config/oscal-salesforce/sbs_to_sscf_mapping.yaml \
            --out-md "$OUT/matrix.md" \
            --out-json "$OUT/backlog.json"

          # Phase 3: benchmark
          python3 -m skills.sscf_benchmark.sscf_benchmark benchmark \
            --backlog "$OUT/backlog.json" \
            --out "$OUT/sscf_report.json"

          # Phase 4: NIST review (dry-run)
          python3 -m skills.nist_review.nist_review assess \
            --gap-analysis "$OUT/gap_analysis.json" \
            --backlog "$OUT/backlog.json" \
            --platform salesforce \
            --out "$OUT/nist_review.json" \
            --dry-run

          # Phase 5: OSCAL POA&M (persistent cumulative — seeds fresh on CI; no prior run)
          python3 scripts/gen_poam.py \
            --backlog "$OUT/backlog.json" \
            --org ci-dry-run-sfdc \
            --platform salesforce \
            --out "$OUT/poam.json"

          # Phase 5b: OSCAL Assessment Results
          python3 scripts/gen_assessment_results.py \
            --gap-analysis "$OUT/gap_analysis.json" \
            --backlog "$OUT/backlog.json" \
            --org ci-dry-run-sfdc \
            --platform salesforce \
            --resolved-catalog config/salesforce/sbs_resolved_catalog.json \
            --out "$OUT/assessment_results.json"

          # Phase 5c: OSCAL SSP (generated per run — stays in sync with assessment state)
          python3 scripts/gen_ssp.py \
            --sscf-report "$OUT/sscf_report.json" \
            --backlog "$OUT/backlog.json" \
            --nist-review "$OUT/nist_review.json" \
            --org ci-dry-run-sfdc \
            --platform salesforce \
            --out "$OUT/ssp.json"

          # Phase 5d: AICM coverage crosswalk (AI Controls Matrix)
          python3 scripts/gen_aicm_crosswalk.py \
            --backlog "$OUT/backlog.json" \
            --org ci-dry-run-sfdc \
            --platform salesforce \
            --out "$OUT/aicm_coverage.json"

          # Phase 6: report (mock LLM — no API spend)
          python3 -m skills.report_gen.report_gen generate \
            --backlog "$OUT/backlog.json" \
            --sscf-benchmark "$OUT/sscf_report.json" \
            --nist-review "$OUT/nist_review.json" \
            --aicm-coverage "$OUT/aicm_coverage.json" \
            --audience security \
            --org-alias ci-dry-run-sfdc \
            --mock-llm \
            --out "$OUT/ci-dry-run-sfdc_security_assessment.md"

          echo "=== Salesforce dry-run complete ==="
          REPORT="$OUT/sscf_report.json"
          python3 -c "
          import json, sys
          with open(sys.argv[1]) as f:
              r = json.load(f)
          score = r.get('overall_score', 0)
          status = r.get('overall_status', '?').upper()
          print(f'Overall score: {score:.1%} ({status})')
          " "$REPORT"

      - name: Upload Salesforce dry-run artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: sfdc-dry-run-${{ github.run_id }}
          path: docs/oscal-salesforce-poc/generated/ci-dry-run-sfdc/
          retention-days: 30

  workday-dry-run:
    name: Workday dry-run assessment
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' || github.event.inputs.platform == 'workday' || github.event.inputs.platform == 'both' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e .

      - name: Run Workday dry-run
        env:
          QDRANT_IN_MEMORY: "1"
          MEMORY_ENABLED: "0"
        run: |
          python3 scripts/workday_dry_run_demo.py --org ci-dry-run-workday --env dev

          echo "=== Workday dry-run complete ==="
          TODAY=$(date +%Y-%m-%d)
          OUT="docs/oscal-salesforce-poc/generated/ci-dry-run-workday/$TODAY"
          if [ -f "$OUT/sscf_report.json" ]; then
            python3 -c "
            import json, sys
            with open(sys.argv[1]) as f:
                r = json.load(f)
            score = r.get('overall_score', 0)
            status = r.get('overall_status', '?').upper()
            print(f'Overall score: {score:.1%} ({status})')
            " "$OUT/sscf_report.json"
          fi

      - name: Upload Workday dry-run artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: workday-dry-run-${{ github.run_id }}
          path: docs/oscal-salesforce-poc/generated/ci-dry-run-workday/
          retention-days: 30
