name: sbom

on:
  push:
    branches: [main]

permissions:
  contents: write  # needed to commit the generated SBOM

jobs:
  generate-sbom:
    name: Generate CycloneDX SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - run: pip install cyclonedx-bom
      - run: pip install -e .

      - name: Generate SBOM
        run: cyclonedx-py environment --output-format json --output-file docs/sbom.cdx.json

      - name: Commit SBOM if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/sbom.cdx.json
          if git diff --cached --quiet; then
            echo "SBOM unchanged — nothing to commit"
          else
            git commit -m "chore(sbom): regenerate CycloneDX SBOM [skip ci]"
            git push
          fi
