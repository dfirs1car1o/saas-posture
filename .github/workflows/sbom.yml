name: sbom

on:
  push:
    branches: [main]

permissions:
  contents: read  # read-only; SBOM is uploaded as artifact, not committed

jobs:
  generate-sbom:
    name: Generate CycloneDX SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.11"

      - run: pip install cyclonedx-bom
      - run: pip install -e .

      - name: Generate SBOM
        run: cyclonedx-py environment --output-format json --output-file docs/sbom.cdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: sbom-cyclonedx
          path: docs/sbom.cdx.json
          retention-days: 90

      - name: Install grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Scan SBOM for vulnerabilities (fail on HIGH+)
        run: grype sbom:docs/sbom.cdx.json --fail-on high -o json > grype-results.json

      - name: Upload grype scan results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: grype-results
          path: grype-results.json
          retention-days: 30
