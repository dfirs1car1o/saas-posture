# iso27001_2022_annex_a_catalog.yaml
# ISO/IEC 27001:2022 Annex A — Complete information security controls reference
#
# 93 controls across 4 themes.
# Used by report_gen.py _render_iso27001_soa() to produce a complete Statement of
# Applicability (SoA) showing all 93 controls with applicability decisions —
# not only those touched by assessment findings.
#
# Default applicability by theme when no SSCF mapping exists:
#   ORG (5.x) — not_assessed_by_api: organizational process controls require manual review
#   PEO (6.x) — not_assessed_by_api: HR/people controls require manual review
#   PHY (7.x) — not_assessed_by_api: physical controls are outside SaaS API assessment scope
#   TEC (8.x) — not_assessed_by_api: tech controls not covered by collector require manual review
#
# Controls touched by SSCF mappings (sscf_to_iso27001_mapping.yaml) are marked
# applicable with their assessment status injected at report generation time.

version: "1.0"
standard: "ISO/IEC 27001:2022"
annex_a_title: "Information security controls reference"
publication_date: "2022-10-25"
total_controls: 93
themes:
  - id: ORG
    clause: "5"
    title: Organizational controls
    count: 37
  - id: PEO
    clause: "6"
    title: People controls
    count: 8
  - id: PHY
    clause: "7"
    title: Physical controls
    count: 14
    default_applicability: not_assessed_by_api
    default_reason: "Physical controls are outside the scope of SaaS API-based configuration assessment."
  - id: TEC
    clause: "8"
    title: Technological controls
    count: 34

controls:

